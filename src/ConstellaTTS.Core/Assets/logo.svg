  <circle cx="375" cy="150" r="9" fill="url(#sg1)" opacity="0.7"/>
  <circle cx="375" cy="150" r="3" fill="#fff" filter="url(#glow)"/>
  <polygon points="375,138 377,148 386,150 377,152 375,162 373,152 364,150 373,148" fill="#fff" opacity="0.9"/>

  <circle cx="468" cy="248" r="20" fill="url(#sg2)" opacity="0.45"/>
