<svg xmlns="http://www.w3.org/2000/svg" viewBox="80 90 500 390">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60aaff"/>
      <stop offset="50%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#9b4dca"/>
    </linearGradient>
    <linearGradient id="bgl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#50e0ff"/>
      <stop offset="100%" stop-color="#6090ff"/>
    </linearGradient>
    <linearGradient id="bgr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d060ff"/>
      <stop offset="100%" stop-color="#ff60a0"/>
    </linearGradient>
    <radialGradient id="sg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#c0d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6090ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffb0e0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c060ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- crescent -->
  <path fill="none" stroke="url(#cg)" stroke-width="13" stroke-linecap="round" d="M 430,102 A 190,190 0 1 0 430,458"/>

  <!-- constellation lines -->
