    <line x1="300" y1="248" x2="288" y2="342"/>
    <line x1="300" y1="248" x2="368" y2="293"/>
    <line x1="368" y1="293" x2="468" y2="248"/>
    <line x1="368" y1="293" x2="358" y2="384"/>
    <line x1="358" y1="384" x2="330" y2="406"/>
  </g>

  <!-- stars -->
